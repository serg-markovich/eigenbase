---
- name: Download Ollama installer
  ansible.builtin.get_url:
    url: "https://ollama.com/install.sh"
    dest: /tmp/ollama_install.sh
    mode: '0755'

- name: Run Ollama installer
  ansible.builtin.command: /tmp/ollama_install.sh
  args:
    creates: /usr/local/bin/ollama
  become: true
  changed_when: false

- name: Enable Ollama service
  ansible.builtin.systemd:
    name: ollama
    enabled: true
    state: started
    daemon_reload: true
  become: true
