---
- name: Create .eigenstack config directory
  ansible.builtin.file:
    path: "{{ home_dir }}/.eigenstack"
    state: directory
    mode: '0755'

- name: Template kind cluster config
  ansible.builtin.template:
    src: kind-cluster.yml.j2
    dest: "{{ home_dir }}/.eigenstack/kind-cluster.yml"
    mode: '0644'

- name: Check existing kind clusters
  ansible.builtin.command: kind get clusters
  register: eigenstack_dev_kind_clusters
  changed_when: false
  failed_when: false

- name: Create kind cluster for eigenstack dev
  ansible.builtin.command: >
    kind create cluster --name {{ eigenstack_dev_cluster_name }}
  changed_when: true
    --config {{ home_dir }}/.eigenstack/kind-cluster.yml
  when:
    - eigenstack_dev_kind_cluster
    - eigenstack_dev_cluster_name not in eigenstack_dev_kind_clusters.stdout

- name: Create Kubernetes namespaces
  ansible.builtin.command: >
    kubectl create namespace {{ item }} --dry-run=client -o yaml | kubectl apply -f -
  loop: "{{ eigenstack_dev_namespaces }}"
  when: eigenstack_dev_kind_cluster
  changed_when: false
